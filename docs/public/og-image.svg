<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5f67ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b82ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105" />
    <line x1="0" y1="210" x2="1200" y2="210" />
    <line x1="0" y1="315" x2="1200" y2="315" />
    <line x1="0" y1="420" x2="1200" y2="420" />
    <line x1="0" y1="525" x2="1200" y2="525" />
    <line x1="200" y1="0" x2="200" y2="630" />
    <line x1="400" y1="0" x2="400" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" />
    <line x1="800" y1="0" x2="800" y2="630" />
    <line x1="1000" y1="0" x2="1000" y2="630" />
  </g>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)" />

  <!-- Logo circle -->
  <circle cx="120" cy="120" r="52" fill="#5f67ee" />
  <text x="120" y="138" font-family="Arial, sans-serif" font-size="52" font-weight="bold"
        fill="white" text-anchor="middle">K</text>

  <!-- Main title -->
  <text x="196" y="107" font-family="Arial, sans-serif" font-size="72" font-weight="bold"
        fill="#ffffff" letter-spacing="-1">Kassie</text>
  <text x="196" y="148" font-family="Arial, sans-serif" font-size="26"
        fill="#7b82ff">Database Explorer</text>

  <!-- Divider -->
  <rect x="80" y="190" width="1040" height="1" fill="#ffffff" fill-opacity="0.1" />

  <!-- Tagline -->
  <text x="80" y="260" font-family="Arial, sans-serif" font-size="36" font-weight="600"
        fill="#e2e8f0">Modern terminal &amp; web explorer for</text>
  <text x="80" y="314" font-family="Arial, sans-serif" font-size="36" font-weight="600"
        fill="#e2e8f0">Apache Cassandra &amp; ScyllaDB</text>

  <!-- Feature pills -->
  <!-- TUI pill -->
  <rect x="80" y="370" width="160" height="44" rx="22" fill="#5f67ee" fill-opacity="0.2" stroke="#5f67ee" stroke-width="1.5" />
  <text x="160" y="398" font-family="Arial, sans-serif" font-size="18" font-weight="600"
        fill="#7b82ff" text-anchor="middle">TUI Client</text>

  <!-- Web pill -->
  <rect x="258" y="370" width="160" height="44" rx="22" fill="#5f67ee" fill-opacity="0.2" stroke="#5f67ee" stroke-width="1.5" />
  <text x="338" y="398" font-family="Arial, sans-serif" font-size="18" font-weight="600"
        fill="#7b82ff" text-anchor="middle">Web Client</text>

  <!-- Single Binary pill -->
  <rect x="436" y="370" width="200" height="44" rx="22" fill="#5f67ee" fill-opacity="0.2" stroke="#5f67ee" stroke-width="1.5" />
  <text x="536" y="398" font-family="Arial, sans-serif" font-size="18" font-weight="600"
        fill="#7b82ff" text-anchor="middle">Single Binary</text>

  <!-- Open Source pill -->
  <rect x="654" y="370" width="200" height="44" rx="22" fill="#5f67ee" fill-opacity="0.2" stroke="#5f67ee" stroke-width="1.5" />
  <text x="754" y="398" font-family="Arial, sans-serif" font-size="18" font-weight="600"
        fill="#7b82ff" text-anchor="middle">Open Source</text>

  <!-- URL -->
  <text x="80" y="490" font-family="Arial, sans-serif" font-size="22"
        fill="#64748b">kassie.kashifkhan.dev</text>

  <!-- GitHub link -->
  <text x="80" y="530" font-family="Arial, sans-serif" font-size="20"
        fill="#475569">github.com/KashifKhn/kassie</text>

  <!-- Decorative circles (right side) -->
  <circle cx="1050" cy="315" r="200" fill="#5f67ee" fill-opacity="0.05" />
  <circle cx="1050" cy="315" r="140" fill="#5f67ee" fill-opacity="0.06" />
  <circle cx="1050" cy="315" r="80" fill="#5f67ee" fill-opacity="0.08" />
</svg>
